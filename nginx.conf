# ===== TechBlog Nginx 配置 =====
# 将此文件复制到 /etc/nginx/conf.d/blog.conf 或对应目录
# 使用方法:
#   1. sudo cp nginx.conf /etc/nginx/conf.d/blog.conf
#   2. 修改 server_name 为你的域名
#   3. 修改 root 为你的前端构建目录路径
#   4. sudo nginx -t  (测试配置)
#   5. sudo systemctl reload nginx

server {
    listen       80;
    server_name  localhost;  # 替换为你的域名，如 blog.example.com

    # ===== 前端静态文件 =====
    root /var/www/blog/dist;  # Vite 构建输出目录
    index index.html;

    # ===== Gzip 压缩 - 提升加载速度 =====
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # ===== 静态资源缓存 - 性能优化 =====
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff2|woff|ttf)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }

    # ===== API 反向代理 → Express 后端 =====
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 上传文件大小限制
        client_max_body_size 10m;
    }

    # ===== 上传文件访问 =====
    location /uploads/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        expires 7d;
    }

    # ===== Vue Router History 模式支持 =====
    # 所有未匹配的请求都返回 index.html，由前端路由处理
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ===== 安全头 =====
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}
